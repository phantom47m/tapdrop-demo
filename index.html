<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TapDrop — Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #EFE9DD;
  color: #11110F;
  font-family: 'IBM Plex Mono', monospace;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 32px;
}
.box {
  max-width: 520px;
  text-align: center;
}
.brand {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 48px;
  letter-spacing: -0.02em;
  margin-bottom: 24px;
}
.brand .dot {
  display: inline-block; width: 8px; height: 8px;
  background: #D63F1B; border-radius: 50%;
  margin: 0 3px 6px; vertical-align: middle;
}
.eyebrow {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #6E6A60;
  margin-bottom: 18px;
}
p {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 350;
  font-size: 22px;
  line-height: 1.35;
  color: #2A2A26;
  margin-bottom: 28px;
}
p em { color: #D63F1B; font-style: italic; }
.cta {
  display: inline-block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #11110F;
  border: 1.5px solid #11110F;
  padding: 14px 22px;
  border-radius: 999px;
  text-decoration: none;
  transition: all 0.2s ease;
}
.cta:hover { background: #11110F; color: #EFE9DD; }
.foot {
  margin-top: 36px;
  font-size: 9.5px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #A39E91;
}
</style>
</head>
<body>
<div class="box">
  <div class="brand">Tap<span class="dot"></span>Drop</div>
  <div class="eyebrow">— Demo Environment —</div>
  <p>Drop a file. Show your screen.<br><em>They tap it.</em></p>
  <a class="cta" href="./g/T9F4K/">View sample drop →</a>
  <div class="foot">47 Industries × iUSEJOE · 2026</div>
</div>
</body>
</html>
